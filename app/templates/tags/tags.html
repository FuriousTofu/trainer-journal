{% extends "layout.html" %}

{% block title %}Tags{% endblock %}
    
{% block main %}
    <div class="d-flex justify-content-center gap-3 mb-3">
        <h2>Your session tags</h2> 
        <a href="{{ url_for('.add_tag') }}" class="btn btn-outline-primary mb-3">
            <i class="bi bi-plus-circle"></i> Add
        </a>
    </div>
    {% if tags|length == 0 %}
        <div class="d-flex justify-content-center align-items-center" style="min-height: 200px;">
            <div class="card shadow-sm border-0 text-center p-4" style="width: 300px;">
                <i class="bi bi-info-circle fs-1 mb-2"></i>
                <div>You can use tags to label your sessions.<br>Please add some to activate this view.</div>
            </div>  
        </div>   
    {% else %}
        <div class="row row-cols-1 row-cols-md-4 g-3 justify-content-center">
        {% for tag in tags %}
            <div class="col">
                <a 
                    href="{{ url_for('.tag', tag_id=tag.id) }}"
                    class="text-decoration-none text-body"
                >
                    <div style="--tag-color: {{ tag.color }}" class="card tag-card shadow-sm border-0 text-center p-3">
                        <span style="font-weight: bold;">
                            {{ tag.name }}
                        </span>
                    </div>
                </a>
            </div>
        {% endfor %}
        </div>
    {% endif %}
{% endblock %}
