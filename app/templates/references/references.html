{% extends "layout.html" %}

{% block title %}References{% endblock %}

{% block main %}

    <div id="references-panel">
        <ul class="nav nav-tabs justify-content-center mb-4" role="tablist">
            <li class="nav-item" role="presentation">
                <button
                    class="nav-link {% if active_tab == 'exercises' %}active{% endif %}"
                    hx-get="{{ url_for('.references', tab='exercises') }}"
                    hx-target="#references-panel"
                    hx-select="#references-panel"
                    hx-swap="outerHTML"
                    hx-push-url="{{ url_for('.references', tab='exercises') }}"
                >
                    <i class="bi bi-heart-pulse-fill"></i> Exercises
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button
                    class="nav-link {% if active_tab == 'tags' %}active{% endif %}"
                    hx-get="{{ url_for('.references', tab='tags') }}"
                    hx-target="#references-panel"
                    hx-select="#references-panel"
                    hx-swap="outerHTML"
                    hx-push-url="{{ url_for('.references', tab='tags') }}"
                >
                    <i class="bi bi-tags-fill"></i> Tags
                </button>
            </li>
        </ul>

        {% if active_tab == 'exercises' %}
            {% include "references/_exercises_tab.html" %}
        {% else %}
            {% include "references/_tags_tab.html" %}
        {% endif %}
    </div>
{% endblock %}
